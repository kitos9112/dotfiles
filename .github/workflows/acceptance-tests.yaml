---
name: Acceptance Tests

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  linux:
    name: Linux Smoke (${{ matrix.os }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        os:
          - almalinux-9
          - almalinux-10
          - ubuntu-24.04
          - ubuntu-25.10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          file: ./tests/${{ matrix.os }}/Dockerfile
          push: false
          provenance: false

      - name: Notify about failure
        uses: umahmood/pushover-actions@main
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        with:
          status: ${{ job.status }}
          title: "🟡 [Dotfiles] - Acceptance Tests Failed"
          message: "GitHub Actions acceptance tests failed. Take a look"
          url_title: "View on Github"
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          priority: "-1" # low priority - no sound or vibration generated
        if: failure() && github.event_name == 'schedule'

  macos:
    name: macOS Smoke
    runs-on: macos-15
    env:
      DOTFILES_TEST: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install chezmoi
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          sh -c "$(curl -fsLS https://get.chezmoi.io/lb)" -- -b "${RUNNER_TEMP}/bin"

      - name: Apply dotfiles to a temporary home
        run: |
          target_dir="${RUNNER_TEMP}/dotfiles-home"
          export PATH="${RUNNER_TEMP}/bin:${PATH}"
          export HOME="${target_dir}"
          export XDG_CONFIG_HOME="${target_dir}/.config"
          export XDG_DATA_HOME="${target_dir}/.local/share"
          export XDG_STATE_HOME="${target_dir}/.local/state"
          export XDG_CACHE_HOME="${target_dir}/.cache"
          mkdir -p "${HOME}" "${XDG_CONFIG_HOME}" "${XDG_DATA_HOME}" "${XDG_STATE_HOME}" "${XDG_CACHE_HOME}"
          chezmoi init --apply --source "${GITHUB_WORKSPACE}" --exclude scripts --no-tty
          chezmoi verify --source "${GITHUB_WORKSPACE}" --exclude scripts --no-tty
